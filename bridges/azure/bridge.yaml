# ============================================================================
# Tendril Bridge Manifest - Azure
# ============================================================================
# Azure Resource Manager bridge -- VMs, NSGs, storage, AVD, Arc, Key Vault,
# Recovery Services, SQL, monitoring, and cost data via az CLI and REST API.
# Supports both Azure Commercial and Azure Government (GCC/GCC High).
# ============================================================================

name: azure
version: "2026.03.01.1"
description: "Azure Resource Manager bridge for VMs, NSGs, storage, AVD, Arc, Key Vault, Recovery Services, SQL, and monitoring (Commercial and Government)"

deployment:
  type: container
  base: "tendril-bridge-base:latest"
  hostname: "bridge-azure"
  timezone: "UTC"

credentials:
  - name: "Azure Cloud"
    env_var: "AZURE_CLOUD"
    description: "Target cloud: 'usgovernment' or 'commercial' (determines login, ARM, and scope endpoints)"
    scope: "shared"
    required: true
  - name: "Azure Tenant ID"
    env_var: "AZURE_TENANT_ID"
    description: "Entra ID tenant ID (from portal.azure.us for Gov, portal.azure.com for Commercial)"
    scope: "shared"
    required: true
  - name: "Azure Client ID"
    env_var: "ARM_CLIENT_ID"
    description: "App registration client ID (service principal)"
    scope: "shared"
    required: true
  - name: "Azure Client Secret"
    env_var: "ARM_CLIENT_SECRET"
    description: "App registration client secret"
    scope: "shared"
    required: true
  - name: "Azure Subscription ID"
    env_var: "AZURE_SUBSCRIPTION_ID"
    description: "Target Azure subscription ID"
    scope: "shared"
    required: true

dependencies:
  pip:
    - "requests>=2.31.0"
    - "python-dotenv>=1.0.0"
    - "msal>=1.28.0"
  system:
    - "curl"
    - "ca-certificates"
    - "procps"
    - "iputils-ping"
    - "iproute2"
    - "dnsutils"
    - "net-tools"
    - "traceroute"
    - "gnupg"
    - "azure-cli"

healthcheck:
  script: "python3 /opt/bridge/data/tools/arm_check.py"
  interval: "60s"
  timeout: "30s"

metadata:
  author: "tendril-project"
  category: "cloud"
  tags: "azure, arm, compute, networking, avd, storage, keyvault, recovery, sql, arc, monitoring, government, gcc"

canopy_references:
  - id: "organizational-glossary"
    description: "Org-wide terminology and abbreviation mappings"
  - id: "server-discovery-workflow"
    description: "Server discovery and CMDB documentation workflow for infrastructure inventory"
  - id: "tendril-deploy-runbook"
    description: "Tendril Root deployment runbook covering Docker and GitHub Actions on Azure VMs"
