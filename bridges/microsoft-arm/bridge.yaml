# ============================================================================
# Tendril Bridge Manifest -- Microsoft ARM (Azure Resource Manager)
# ============================================================================
# Azure Resource Manager bridge -- VMs, NSGs, storage, AVD, Arc, Key Vault,
# Recovery Services, SQL, monitoring, and cost data via az CLI and REST API.
# Supports both Azure Commercial and Azure Government (GCC/GCC High).
#
# Validate: trellis validate microsoft-arm
# Build:    trellis build microsoft-arm
# Deploy:   trellis deploy microsoft-arm
# ============================================================================

name: microsoft-arm
version: "2026.03.04.1"
description: >
  Azure Resource Manager bridge for VMs, NSGs, storage, AVD, Arc, Key Vault,
  Recovery Services, SQL, monitoring, and cost data via az CLI and Python REST
  helpers. Supports Azure Commercial and Government (GCC/GCC High).
license: Apache-2.0

deployment:
  type: container
  base: "tendril-bridge-base:latest"
  hostname: "bridge-microsoft-arm"
  timezone: "UTC"

credentials:
  - name: "Azure Cloud"
    env_var: "AZURE_CLOUD"
    description: "Target cloud: 'usgovernment' or 'commercial' (determines login, ARM, and scope endpoints)"
    scope: "shared"
    required: true
  - name: "Azure Tenant ID"
    env_var: "AZURE_TENANT_ID"
    description: "Entra ID tenant ID (from portal.azure.us for Gov, portal.azure.com for Commercial)"
    scope: "shared"
    required: true
  - name: "Azure Client ID"
    env_var: "AZURE_CLIENT_ID"
    description: "App registration client ID (service principal with Contributor + Desktop Virtualization Contributor RBAC)"
    scope: "shared"
    required: true
  - name: "Azure Client Secret"
    env_var: "AZURE_CLIENT_SECRET"
    description: "App registration client secret"
    scope: "shared"
    required: true
  - name: "Azure Subscription ID"
    env_var: "AZURE_SUBSCRIPTION_ID"
    description: "Target Azure subscription ID"
    scope: "shared"
    required: true

dependencies:
  pip:
    - "requests>=2.31.0"
    - "python-dotenv>=1.0.0"
    - "msal>=1.28.0"
  system:
    - "curl"
    - "ca-certificates"
    - "procps"
    - "iputils-ping"
    - "iproute2"
    - "dnsutils"
    - "net-tools"
    - "traceroute"
    - "gnupg"
    - "jq"
    - "azure-cli"

skill_scope: bridge

healthcheck:
  script: "python3 /opt/bridge/data/tools/arm_check.py"
  interval: "60s"
  timeout: "30s"

metadata:
  author: "tendril-project"
  category: "cloud"
  tags: "azure, arm, compute, networking, avd, storage, keyvault, recovery, sql, arc, monitoring, government, gcc"
  changelog: |
    2026.03.04.1 - Renamed azure -> microsoft-arm, standardized env vars (AZURE_CLIENT_ID), added jq
    2026.03.01.1 - Added GCC/Government cloud support, Dockerfile, docker-compose.yml
    2026.02.19.1 - Initial catalog entry
