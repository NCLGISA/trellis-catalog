# ============================================================================
# Tendril Bridge Manifest - Microsoft Purview
# ============================================================================
# Security & Compliance PowerShell bridge -- DLP policies, retention
# policies/labels, sensitivity labels, alert policies, eDiscovery (read),
# and information barrier management.
# Uses ExchangeOnlineManagement module with certificate-based authentication
# via Connect-IPPSSession.
# ============================================================================

name: microsoft-purview
version: "2026.02.23.1"
description: "Security & Compliance PowerShell bridge for DLP, retention, sensitivity labels, alert policies, eDiscovery (read-only), and information barriers"

deployment:
  type: container
  base: "mcr.microsoft.com/powershell:7.4-debian-bookworm"
  hostname: "bridge-microsoft-purview"
  timezone: "UTC"

credentials:
  - name: "Purview Tenant ID"
    env_var: "PURVIEW_TENANT_ID"
    description: "Entra ID tenant ID (GUID) for the Microsoft 365 tenant"
    scope: "shared"
    required: true
  - name: "Purview App ID"
    env_var: "PURVIEW_APP_ID"
    description: >
      App registration client ID with Exchange.ManageAsApp permission and
      Compliance Administrator directory role. See the SKILL.md Setup section
      for step-by-step app registration instructions.
    scope: "shared"
    required: true
  - name: "Purview Certificate Thumbprint"
    env_var: "PURVIEW_CERT_THUMBPRINT"
    description: >
      SHA1 thumbprint of the self-signed certificate uploaded to the app
      registration and mounted as a .pfx file at /opt/bridge/certs/
    scope: "shared"
    required: true
  - name: "Purview Organization"
    env_var: "PURVIEW_ORGANIZATION"
    description: "Tenant onmicrosoft.com domain (e.g., contoso.onmicrosoft.com)"
    scope: "shared"
    required: true

dependencies:
  pip:
    - "requests>=2.31.0"
    - "python-dotenv>=1.0.0"
  system:
    - "python3"
    - "python3-pip"

healthcheck:
  script: "python3 /opt/bridge/data/tools/purview_check.py"
  interval: "120s"
  timeout: "30s"

metadata:
  author: "tendril-project"
  category: "identity"
  tags: "microsoft, purview, dlp, retention, sensitivity-labels, ediscovery, alert-policies, information-barriers, compliance"
  platform_url: "https://compliance.microsoft.com"
  documentation: "https://learn.microsoft.com/en-us/powershell/exchange/connect-to-scc-powershell"
