# Generated by trellis -- regenerated on each build
# Bridge: microsoft-graph v2026.03.04.1
services:
  microsoft-graph:
    image: bridge-microsoft-graph:latest
    build: .
    container_name: bridge-microsoft-graph
    hostname: bridge-microsoft-graph
    restart: unless-stopped
    volumes:
      - microsoft-graph-tendril:/opt/tendril
      - microsoft-graph-data:/opt/bridge/data
    environment:
      - TZ=UTC
      - BRIDGE_SEED_VERSION=${BRIDGE_SEED_VERSION:-1}
      - TENDRIL_INSTALL_KEY=${TENDRIL_INSTALL_KEY}
      - TENDRIL_DOWNLOAD_URL=${TENDRIL_DOWNLOAD_URL}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python3 /opt/bridge/data/tools/graph_check.py --quick || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3

volumes:
  microsoft-graph-tendril:
  microsoft-graph-data:
