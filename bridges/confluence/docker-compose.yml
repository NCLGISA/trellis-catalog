# Generated by trellis -- regenerated on each build
# Bridge: confluence v2026.02.27.1
services:
  confluence:
    image: bridge-confluence:latest
    build: .
    container_name: bridge-confluence
    hostname: bridge-confluence
    restart: unless-stopped
    volumes:
      - confluence-tendril:/opt/tendril
      - confluence-data:/opt/bridge/data
    environment:
      - TZ=UTC
      - TENDRIL_INSTALL_KEY=${TENDRIL_INSTALL_KEY}
      - TENDRIL_DOWNLOAD_URL=${TENDRIL_DOWNLOAD_URL}
      - CONFLUENCE_URL=${CONFLUENCE_URL}
    healthcheck:
      test: ["CMD-SHELL", "python3 /opt/bridge/data/tools/confluence_check.py || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3

volumes:
  confluence-tendril:
  confluence-data:
